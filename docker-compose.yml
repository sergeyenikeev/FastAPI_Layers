services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: workflow_db
      POSTGRES_USER: workflow_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_user -d workflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v3.2.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://workflow_user:${POSTGRES_PASSWORD:-replace-me}@postgres:5432/workflow_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      API_KEYS: replace-with-api-key
    command: ["/bin/sh", "docker/start-api.sh"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker-projection:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://workflow_user:${POSTGRES_PASSWORD:-replace-me}@postgres:5432/workflow_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WORKER_ROLE: projection
      SERVICE_NAME: projection-worker
    command: ["/bin/sh", "docker/start-worker.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker-analytics:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://workflow_user:${POSTGRES_PASSWORD:-replace-me}@postgres:5432/workflow_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WORKER_ROLE: analytics
      SERVICE_NAME: analytics-worker
    command: ["/bin/sh", "docker/start-worker.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker-alerts:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://workflow_user:${POSTGRES_PASSWORD:-replace-me}@postgres:5432/workflow_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WORKER_ROLE: alerts
      SERVICE_NAME: alerts-worker
    command: ["/bin/sh", "docker/start-worker.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
