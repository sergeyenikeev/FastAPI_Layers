apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workflow-platform-secrets
  namespace: workflow-platform
spec:
  # Пример показывает, как не хранить runtime secrets внутри chart values и Git,
  # а подтягивать их из внешнего secret backend-а, например Vault.
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: workflow-platform-secrets
    creationPolicy: Owner
  data:
    # Имена secretKey должны совпадать с env-переменными, которые ожидает
    # приложение и которые затем подхватываются через envFrom secretRef.
    - secretKey: API_KEYS
      remoteRef:
        key: workflow-platform/API_KEYS
    - secretKey: JWT_SECRET
      remoteRef:
        key: workflow-platform/JWT_SECRET
