apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-platform-restricted-egress
  namespace: workflow-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workflow-platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
      ports:
        - protocol: TCP
          port: 9092
