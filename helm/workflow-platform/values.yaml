# values.yaml задает production-oriented baseline для chart-а. Здесь собраны
# общие defaults, которые затем могут точечно переопределяться в dev/prod
# профилях без дублирования всей конфигурации.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/example/workflow-platform
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

existingSecretName: workflow-platform-secrets

config:
  # ConfigMap хранит несекретные runtime-параметры. Секреты намеренно вынесены
  # в Secret/ExternalSecret, чтобы chart оставался совместимым с vault-подобными
  # системами и не тащил чувствительные значения в Git.
  appName: workflow-platform
  appEnv: prod
  apiV1Prefix: /api/v1
  debug: "false"
  prometheusEnabled: "true"
  kafkaBootstrapServers: kafka.kafka.svc.cluster.local:9092
  kafkaSecurityProtocol: PLAINTEXT
  redisUrl: redis://redis-master.redis.svc.cluster.local:6379/0
  databaseUrl: postgresql+asyncpg://workflow_user:replace-me@postgresql-rw.database.svc.cluster.local:5432/workflow_db
  otelExporterOtlpEndpoint: http://otel-collector.otel.svc.cluster.local:4317
  modelProbeUrls: ""
  alertCooldownSeconds: "300"

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
  runAsUser: 10001
  runAsGroup: 10001

api:
  # API держим минимум в двух репликах по умолчанию, потому что это state-light
  # stateless слой, от которого ожидается высокая доступность при rolling update.
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    startup:
      path: /api/v1/health/live
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 30
    liveness:
      path: /api/v1/health/live
      initialDelaySeconds: 20
      periodSeconds: 15
      failureThreshold: 3
    readiness:
      path: /api/v1/health/ready
      initialDelaySeconds: 20
      periodSeconds: 15
      failureThreshold: 3
  terminationGracePeriodSeconds: 45
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

apiServices:
  # Каждый API bounded context разворачивается отдельно. Gateway оставлен как
  # переходный слой совместимости, а остальные сервисы можно масштабировать и
  # публиковать независимо.
  #
  # `component` напрямую маппится на APP_COMPONENT внутри контейнера, а значит
  # определяет, какой ASGI entrypoint выберет docker/start-api.sh.
  # `serviceName` попадает в SERVICE_NAME и затем используется в логах,
  # OpenTelemetry resource (`service.name`) и runtime health/heartbeat-сигналах.
  - name: gateway
    enabled: true
    component: gateway
    serviceName: gateway-api
    expose: true
    ingress:
      enabled: true
      path: /
      pathType: Prefix
  - name: registry
    enabled: true
    component: registry
    serviceName: registry-api
    expose: true
    ingress:
      enabled: false
      path: /registry
      pathType: Prefix
  - name: orchestration
    enabled: true
    component: orchestration
    serviceName: orchestration-api
    expose: true
    ingress:
      enabled: false
      path: /orchestration
      pathType: Prefix
  - name: monitoring
    enabled: true
    component: monitoring
    serviceName: monitoring-api
    expose: true
    ingress:
      enabled: false
      path: /monitoring
      pathType: Prefix
  - name: alerting
    enabled: true
    component: alerting
    serviceName: alerting-api
    expose: true
    ingress:
      enabled: false
      path: /alerting
      pathType: Prefix
  - name: audit
    enabled: true
    component: audit
    serviceName: audit-api
    expose: true
    ingress:
      enabled: false
      path: /audit
      pathType: Prefix

workers:
  # Каждый worker описывается отдельной декларацией, чтобы chart мог масштабировать
  # и настраивать их независимо. Это отражает модульность event-driven контура:
  # projection, analytics и alerts имеют разную нагрузку и разные consumer groups.
  - name: projection
    enabled: true
    replicaCount: 1
    role: projection
    consumerGroup: projection-consumers
    primaryTopic: registry.events
    resources:
      requests:
        cpu: 200m
        memory: 384Mi
      limits:
        cpu: "1"
        memory: 1Gi
  - name: analytics
    enabled: true
    replicaCount: 1
    role: analytics
    consumerGroup: anomaly-consumers
    primaryTopic: system.metrics
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  - name: alerts
    enabled: true
    replicaCount: 1
    role: alerts
    consumerGroup: alert-consumers
    primaryTopic: anomaly.events
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

ingress:
  # Ingress включен по умолчанию, потому что публичный API — основной способ
  # работы с платформой. Аннотации сразу готовы для nginx + cert-manager.
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hosts:
    - host: workflow.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: workflow-platform-tls
      hosts:
        - workflow.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

keda:
  # KEDA отвечает именно за event-driven масштабирование worker-ов по lag, а не
  # за API-поды. Это лучше соответствует природе Kafka consumers, чем HPA по CPU.
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 8
  lagThreshold: "50"

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  # NetworkPolicy включена по умолчанию, чтобы chart был secure-by-default:
  # явно разрешается только то, что действительно нужно приложению.
  enabled: true
  ingressNamespaces: []
  allowPrometheusNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: monitoring

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}

migrations:
  # Миграции могут выполняться как Helm hook Job перед install/upgrade, чтобы
  # runtime не стартовал на устаревшей схеме БД.
  enabled: true
  hook: true
