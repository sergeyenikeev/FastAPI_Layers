{{- if .Values.keda.enabled }}
{{- range .Values.workers }}
{{- if .enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "agentOps.fullname" $ }}-{{ .name }}
  labels:
    {{- include "agentOps.labels" $ | nindent 4 }}
spec:
  # ScaledObject связывает конкретный worker deployment с Kafka lag и позволяет
  # масштабировать потребителей по реальной длине очереди, а не по CPU/RAM.
  scaleTargetRef:
    name: {{ include "agentOps.fullname" $ }}-{{ .name }}
  pollingInterval: {{ $.Values.keda.pollingInterval }}
  cooldownPeriod: {{ $.Values.keda.cooldownPeriod }}
  minReplicaCount: {{ $.Values.keda.minReplicaCount }}
  maxReplicaCount: {{ $.Values.keda.maxReplicaCount }}
  triggers:
    - type: kafka
      metadata:
        # consumerGroup и topic приходят из декларации worker-а, чтобы разные
        # bounded-context consumers могли иметь независимую scaling-политику.
        bootstrapServers: {{ $.Values.config.kafkaBootstrapServers | quote }}
        consumerGroup: {{ .consumerGroup | quote }}
        topic: {{ .primaryTopic | quote }}
        lagThreshold: {{ $.Values.keda.lagThreshold | quote }}
---
{{- end }}
{{- end }}
{{- end }}
