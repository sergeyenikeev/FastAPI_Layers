{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agentOps.fullname" . }}-api
  labels:
    {{- include "agentOps.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "agentOps.selectorLabels" . | nindent 6 }}
      component: api
{{- end }}

