{{- range $service := .Values.apiServices }}
{{- if $service.enabled }}
{{- $effectiveReplicaCount := default $.Values.api.replicaCount $service.replicaCount }}
{{- $effectiveTerminationGracePeriodSeconds := default $.Values.api.terminationGracePeriodSeconds $service.terminationGracePeriodSeconds }}
{{- $effectivePodAnnotations := mergeOverwrite (deepCopy $.Values.api.podAnnotations) (default (dict) $service.podAnnotations) }}
{{- $effectiveResources := default $.Values.api.resources $service.resources }}
{{- $effectiveProbes := mergeOverwrite (deepCopy $.Values.api.probes) (default (dict) $service.probes) }}
{{- $effectiveNodeSelector := mergeOverwrite (deepCopy $.Values.api.nodeSelector) (default (dict) $service.nodeSelector) }}
{{- $effectiveTolerations := concat $.Values.api.tolerations (default (list) $service.tolerations) }}
{{- $effectiveAffinity := mergeOverwrite (deepCopy $.Values.api.affinity) (default (dict) $service.affinity) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentOps.fullname" $ }}-{{ $service.name }}
  labels:
    {{- include "agentOps.labels" $ | nindent 4 }}
    component: {{ $service.name }}
spec:
  # API deployment остается stateless: состояние execution и projections живет
  # вне пода, поэтому rolling updates безопасны при корректных probes.
  replicas: {{ $effectiveReplicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "agentOps.selectorLabels" $ | nindent 6 }}
      component: {{ $service.name }}
  template:
    metadata:
      labels:
        {{- include "agentOps.selectorLabels" $ | nindent 8 }}
        component: {{ $service.name }}
      annotations:
        # Помимо ServiceMonitor сохраняем стандартные prometheus annotations,
        # чтобы chart был совместим и с более простыми Prometheus инсталляциями.
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        {{- toYaml $effectivePodAnnotations | nindent 8 }}
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agentOps.serviceAccountName" $ }}
      # У приложения есть время корректно завершить HTTP-запросы и закрыть
      # Kafka/DB подключения до SIGKILL.
      terminationGracePeriodSeconds: {{ $effectiveTerminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      {{- if $effectiveNodeSelector }}
      nodeSelector:
        {{- toYaml $effectiveNodeSelector | nindent 8 }}
      {{- end }}
      {{- if $effectiveTolerations }}
      tolerations:
        {{- toYaml $effectiveTolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $service.name }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bin/sh", "docker/start-api.sh"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "agentOps.fullname" $ }}-config
            - secretRef:
                name: {{ $.Values.existingSecretName }}
          env:
            # APP_COMPONENT выбирает bounded context entrypoint внутри одного
            # контейнерного образа. Благодаря этому chart может развертывать
            # несколько API-сервисов без сборки отдельных image per service.
            - name: APP_COMPONENT
              value: {{ $service.component | quote }}
            # SERVICE_NAME нужен не только для логического имени сервиса, но и
            # для observability: он идет в structured logs, heartbeat payload и
            # OpenTelemetry resource/service.name.
            - name: SERVICE_NAME
              value: {{ $service.serviceName | quote }}
          resources:
            {{- toYaml $effectiveResources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          startupProbe:
            httpGet:
              path: {{ $effectiveProbes.startup.path }}
              port: http
            initialDelaySeconds: {{ $effectiveProbes.startup.initialDelaySeconds }}
            periodSeconds: {{ $effectiveProbes.startup.periodSeconds }}
            failureThreshold: {{ $effectiveProbes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ $effectiveProbes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $effectiveProbes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $effectiveProbes.liveness.periodSeconds }}
            failureThreshold: {{ $effectiveProbes.liveness.failureThreshold }}
          readinessProbe:
            # Readiness смотрит в бизнес-health endpoint, а не просто в открытый
            # порт: pod считается готовым только если runtime может обслуживать API.
            httpGet:
              path: {{ $effectiveProbes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $effectiveProbes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $effectiveProbes.readiness.periodSeconds }}
            failureThreshold: {{ $effectiveProbes.readiness.failureThreshold }}
      {{- if $effectiveAffinity }}
      affinity:
        {{- toYaml $effectiveAffinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          # По умолчанию раскладываем API по разным нодам, чтобы одиночный
          # node failure не уронил весь публичный вход в платформу.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "agentOps.selectorLabels" $ | nindent 20 }}
                    component: {{ $service.name }}
      {{- end }}
---
{{- end }}
{{- end }}
