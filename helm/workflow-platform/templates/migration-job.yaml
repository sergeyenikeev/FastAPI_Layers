{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentOps.fullname" . }}-migrate
  labels:
    {{- include "agentOps.labels" . | nindent 4 }}
  {{- if .Values.migrations.hook }}
  annotations:
    # Job выполняется до install/upgrade, чтобы новый runtime не стартовал
    # поверх старой схемы базы данных.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  {{- end }}
spec:
  template:
    metadata:
      labels:
        {{- include "agentOps.selectorLabels" . | nindent 8 }}
        component: migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "agentOps.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          # Job использует тот же image и те же env, что и runtime, поэтому
          # миграции выполняются в идентичном приложению окружении.
          envFrom:
            - configMapRef:
                name: {{ include "agentOps.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecretName }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
