{{- range $service := .Values.apiServices }}
{{- if $service.enabled }}
{{- $effectiveAutoscaling := mergeOverwrite (deepCopy $.Values.autoscaling) (default (dict) $service.autoscaling) }}
{{- if $effectiveAutoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "agentOps.fullname" $ }}-{{ $service.name }}
  labels:
    {{- include "agentOps.labels" $ | nindent 4 }}
    component: {{ $service.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "agentOps.fullname" $ }}-{{ $service.name }}
  minReplicas: {{ $effectiveAutoscaling.minReplicas }}
  maxReplicas: {{ $effectiveAutoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $effectiveAutoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
{{- end }}
