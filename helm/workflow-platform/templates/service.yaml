apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentOps.fullname" . }}
  labels:
    {{- include "agentOps.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "agentOps.selectorLabels" . | nindent 4 }}
    component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP

